<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- X-UA-Compatible reduz superfície de ataque em IE legado -->
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>{% block titulo %}Currículos{% endblock %} — StarGirl</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #fff1f7;
      --surface:   #f7b3cb;
      --border:    #f385b5;
      --accent:    #e65681;
      --accent2:   #e75480;
      --text:      #312225;
      --muted:     #6d525f;
      --danger:    #f87171;
      --success:   #34d399;
      --radius:    10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── Nav ── */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      height: 56px;
    }
    .nav-brand {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
      font-size: .9rem;
      color: var(--accent2);
      letter-spacing: .04em;
      text-decoration: none;
    }
    .nav-brand span { color: var(--accent); }
    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: .875rem;
      font-weight: 500;
      transition: color .2s;
    }
    nav a:hover { color: var(--text); }
    nav a.active { color: var(--accent2); }

    /* ── Layout ── */
    main {
      max-width: 860px;
      margin: 3rem auto;
      padding: 0 1.5rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 1.75rem;
      color: var(--text);
    }
    h1 .badge {
      display: inline-block;
      font-family: 'JetBrains Mono', monospace;
      font-size: .65rem;
      font-weight: 500;
      background: var(--accent);
      color: #fff;
      padding: .15rem .5rem;
      border-radius: 4px;
      vertical-align: middle;
      margin-right: .5rem;
      letter-spacing: .06em;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
    }

    /* ── Botão ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: .45rem;
      padding: .6rem 1.4rem;
      border-radius: 6px;
      font-size: .875rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      border: none;
      transition: opacity .2s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary  { background: var(--accent);  color: #fff; }
    .btn-ghost    { background: transparent; border: 1px solid var(--border); color: var(--muted); }
    .btn-ghost:hover { border-color: var(--accent2); color: var(--accent2); }
    .btn:hover { opacity: .88; }

    /* ── Form ── */
    .form-group { margin-bottom: 1.4rem; }
    label {
      display: block;
      font-size: .8rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: .45rem;
    }
    label .req { color: var(--accent2); margin-left: .2rem; }
    label .opt { color: var(--muted); font-weight: 400; text-transform: none; letter-spacing: 0; margin-left: .3rem; font-size: .75rem; }
    input, textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: .65rem .9rem;
      color: var(--text);
      font-family: inherit;
      font-size: .9rem;
      outline: none;
      transition: border-color .2s;
    }
    input:focus, textarea:focus { border-color: var(--accent); }
    textarea { min-height: 130px; resize: vertical; }
    input::placeholder, textarea::placeholder { color: var(--muted); }

    /* ── Erros ── */
    .alert-error {
      background: rgba(248,113,113,.1);
      border: 1px solid rgba(248,113,113,.3);
      border-radius: 6px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
      font-size: .875rem;
    }
    .alert-error li { color: var(--danger); list-style: disc; margin-left: 1.2rem; }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: .9rem; }
    thead th {
      text-align: left;
      padding: .75rem 1rem;
      font-size: .75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .07em;
      border-bottom: 1px solid var(--border);
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255, 99, 203, 0.06); }
    tbody td { padding: .9rem 1rem; }
    .empty { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: .9rem; }

    /* ── Detail grid ── */
    .detail-grid { display: grid; gap: 1.25rem; }
    .field-label {
      font-size: .75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-bottom: .3rem;
    }
    .field-value { font-size: .95rem; color: var(--text); word-break: break-word; }
    .field-value.mono { font-family: 'JetBrains Mono', monospace; font-size: .85rem; }
    .field-value a { color: var(--accent2); text-decoration: none; }
    .field-value a:hover { text-decoration: underline; }
    .field-value.pre { white-space: pre-wrap; line-height: 1.7; }
    .pill {
      display: inline-block;
      padding: .2rem .65rem;
      border-radius: 20px;
      font-size: .78rem;
      font-weight: 500;
      background: rgba(255, 88, 213, 0.15);
      color: var(--accent2);
      border: 1px solid rgba(255, 99, 247, 0.3);
    }

    /* ── Actions row ── */
    .actions { display: flex; gap: .75rem; margin-top: 2rem; flex-wrap: wrap; }

    /* ── Error page ── */
    .error-page { text-align: center; padding: 5rem 1rem; }
    .error-code { font-size: 5rem; font-weight: 700; color: var(--border); font-family: 'JetBrains Mono', monospace; }
    .error-msg  { color: var(--muted); margin: 1rem 0 2rem; }
  </style>
</head>
<body>
  <nav>
    <a href="{{ url_for('listar') }}" class="nav-brand"><span>˚˖𓍢ִ໋❀</span> 𝐒𝐭✰𝐫𝐠𝐢𝐫𝐥</a>
    <a href="{{ url_for('listar') }}" class="{% if request.endpoint == 'listar' %}active{% endif %}">Currículos</a>
    <a href="{{ url_for('cadastrar') }}" class="{% if request.endpoint == 'cadastrar' %}active{% endif %}">Novo Cadastro</a>
  </nav>
  <main>
    {% block conteudo %}{% endblock %}
  </main>
</body>
</html>
